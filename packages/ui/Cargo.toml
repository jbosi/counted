[package]
name = "ui"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true }
api = { workspace = true, default-features = false }
shared = { workspace = true }
uuid = { version = "1.17.0", features = ["v4", "serde"] }
chrono = "0.4.41"
web-sys = { version = "0.3.77", features = ["Window", "Storage"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
