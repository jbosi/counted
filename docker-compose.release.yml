services:
  frontend:
    container_name: frontend
    image: jbosi/frontend:latest
    pull_policy: always
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./frontend-react/counted/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - counted-network

  backend:
    container_name: backend
    image: jbosi/backend:latest
    pull_policy: always
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hcount_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hcount}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - counted-network

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hcount}
      POSTGRES_USER: ${POSTGRES_USER:-hcount_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hcount_user} -d ${POSTGRES_DB:-hcount}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - counted-network

networks:
  counted-network:
    driver: bridge

volumes:
  pgdata:
